name: CD

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: "Ejecutar pipeline batch despues del deploy"
        required: false
        default: false
        type: boolean

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/fintech-pipeline
  LOCAL_IMAGE: fintech-pipeline:latest
  DEPLOY_DIR: C:\fintech_pipeline_deploy

jobs:
  test:
    name: Verificar tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Tests unitarios
        run: pytest tests/unit/ -q --tb=short
        env:
          PYTHONPATH: .
          FINTECH_DASHBOARD_TEST_MODE: "true"

  build-and-push:
    name: Build y push imagen Docker
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Validar secretos Docker Hub
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "::error::Falta el secret DOCKER_USERNAME en GitHub Actions."
            exit 1
          fi
          if [ -z "$DOCKER_PASSWORD" ]; then
            echo "::error::Falta el secret DOCKER_PASSWORD en GitHub Actions."
            exit 1
          fi

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-windows:
    name: Deploy Windows local
    runs-on: [self-hosted, Windows]
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Preflight Windows local
        shell: powershell
        run: |
          docker --version
          docker compose version

          $deployDir = "${{ env.DEPLOY_DIR }}"
          if (-not (Test-Path $deployDir)) {
            New-Item -ItemType Directory -Force $deployDir | Out-Null
          }

          if (-not (Test-Path "$deployDir\.env")) {
            throw "Falta $deployDir\.env. Copia tu .env local a esa ruta antes de ejecutar CD."
          }

      - name: Preparar carpeta de despliegue
        shell: powershell
        run: |
          $deployDir = "${{ env.DEPLOY_DIR }}"
          New-Item -ItemType Directory -Force $deployDir | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\data\raw" | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\data\bronze" | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\data\silver" | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\data\gold" | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\outputs\charts" | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\outputs\reports" | Out-Null
          New-Item -ItemType Directory -Force "$deployDir\logs" | Out-Null

          Copy-Item -Path "docker-compose.yml" -Destination "$deployDir\docker-compose.yml" -Force
          if (Test-Path "data\raw") {
            Copy-Item -Path "data\raw\*" -Destination "$deployDir\data\raw" -Recurse -Force
          }

          docker compose --project-directory $deployDir --profile dashboard --profile api --profile ecommerce config --services

      - name: Descargar imagen publicada
        shell: powershell
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          $remoteImage = "${{ env.IMAGE_NAME }}:latest"
          docker pull $remoteImage
          if ($LASTEXITCODE -ne 0) {
            if (-not $env:DOCKER_USERNAME) {
              throw "Falta el secret DOCKER_USERNAME en GitHub Actions."
            }
            if (-not $env:DOCKER_PASSWORD) {
              throw "Falta el secret DOCKER_PASSWORD en GitHub Actions."
            }

            Write-Host "Pull sin login fallo. Intentando login local a Docker Hub..."
            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName = "docker"
            $psi.Arguments = "login -u `"$env:DOCKER_USERNAME`" --password-stdin"
            $psi.RedirectStandardInput = $true
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError = $true
            $psi.UseShellExecute = $false

            $process = New-Object System.Diagnostics.Process
            $process.StartInfo = $psi
            [void] $process.Start()
            $process.StandardInput.WriteLine($env:DOCKER_PASSWORD)
            $process.StandardInput.Close()
            $stdout = $process.StandardOutput.ReadToEnd()
            $stderr = $process.StandardError.ReadToEnd()
            $process.WaitForExit()

            if ($process.ExitCode -ne 0) {
              Write-Host $stdout
              Write-Error $stderr
              exit $process.ExitCode
            }

            Write-Host $stdout
            docker pull $remoteImage
            if ($LASTEXITCODE -ne 0) {
              throw "No se pudo descargar $remoteImage despues del login."
            }
          }
          docker tag $remoteImage "${{ env.LOCAL_IMAGE }}"

      - name: Limpiar contenedores anteriores
        shell: powershell
        run: |
          $containers = @(
            "fintech-dashboard",
            "fintech-api",
            "fintech-ecommerce"
          )

          foreach ($name in $containers) {
            $existing = docker ps -a --filter "name=^/$name$" --format "{{.Names}}"
            if ($existing -eq $name) {
              Write-Host "Eliminando contenedor anterior: $name"
              docker rm -f $name
              if ($LASTEXITCODE -ne 0) {
                throw "No se pudo eliminar el contenedor anterior $name."
              }
            }
          }

      - name: Recrear servicios Windows
        shell: powershell
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose --profile dashboard up -d --force-recreate --no-build dashboard
          docker compose --profile api --profile ecommerce up -d --force-recreate --no-build api ecommerce

      - name: Health check local
        shell: powershell
        run: |
          $ok = $false
          for ($i = 1; $i -le 18; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:8501/_stcore/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 5
            }
          }
          if (-not $ok) {
            docker ps
            docker compose --project-directory "${{ env.DEPLOY_DIR }}" logs --tail=80 dashboard
            throw "El dashboard no respondio el health check local."
          }
          Write-Host "Dashboard OK: http://127.0.0.1:8501"

      - name: Mostrar contenedores
        shell: powershell
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose ps

  run-pipeline-windows:
    name: Ejecutar pipeline Gold Windows
    runs-on: [self-hosted, Windows]
    needs: deploy-windows
    if: github.event_name == 'workflow_dispatch' && inputs.run_pipeline == true

    steps:
      - name: Ejecutar pipeline batch
        shell: powershell
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose --profile pipeline run --rm --no-build pipeline
          docker compose ps
