[pytest]
testpaths = tests
addopts = -ra --strict-markers -m "not cloud and not performance and not e2e"
markers =
    unit: fast tests for isolated functions and transformations
    integration: local multi-module tests that do not require real cloud services
    cloud: real network/cloud tests for S3, ExchangeRate and Databricks
    performance: benchmark/performance tests excluded from normal unit intent
    property: property-based tests powered by Hypothesis
    ui: Streamlit dashboard rendering tests
    slow: longer running tests
    e2e: end-to-end browser tests via Playwright (require live Streamlit server)
